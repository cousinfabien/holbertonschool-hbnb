<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png" type="image/png">
</head>
<body>

        <nav class="navbar">
            <div class="logo-container">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
