<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Place Details</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png" type="image/png">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-container">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html" id="login-link" class="login-button">Login</a>
            </div>
        </nav>
    </header>

    <main class="place-details">
        <section id="place-details">
            <div class="loading">Loading details...</div>
        </section>

        <section id="add-review" style="display: none;">
            <h3>Leave a Review</h3>
            <form id="review-form" class="form">
                <div class="form-group">
                    <label for="rating">Rating (1-5):</label>
                    <select id="rating" name="rating" required>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Very Good</option>
                        <option value="3">3 - Average</option>
                        <option value="2">2 - Poor</option>
                        <option value="1">1 - Terrible</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="review-text">Comment:</label>
                    <textarea id="review-text" name="text" rows="4" placeholder="Share your experience..." required></textarea>
                </div>
                <button type="submit" class="details-button">Submit Review</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
